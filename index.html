<!DOCTYPE html>
<html>
<head>
<title>App DNI</title>
</head>

<body>

<h2>🧠 DNI y Emociones</h2>

<input id="dni" placeholder="DNI">
<button onclick="buscar()">Buscar</button>

<div id="info"></div>

<div id="emociones" style="display:none;">
    <button onclick="guardar('Feliz')">😀</button>
    <button onclick="guardar('Triste')">😢</button>
    <button onclick="guardar('Molesto')">😡</button>
</div>

<script>

let estudiantes = {};
let dniActual = "";

fetch("https://script.google.com/macros/s/AKfycbzNx3bsFGWfwO6AvD3v1tWCCb98KDIfFGl1LrU_EEQvRokyIHkGkFArCmBmJH4lRxdl/exec")
.then(res => res.json())
.then(data => {
    estudiantes = data;
});

function buscar(){

    let dni = document.getElementById("dni").value;

    if(estudiantes[dni]){

        dniActual = dni;

        document.getElementById("info").innerHTML =
        estudiantes[dni].nombre + " - " +
        estudiantes[dni].grado + " " +
        estudiantes[dni].seccion;

        document.getElementById("emociones").style.display = "block";

    } else {
        document.getElementById("info").innerHTML = "❌ No encontrado";
    }
}

function guardar(emocion){

    let fecha = new Date().toDateString();
    let key = dniActual + "_" + fecha;

    if(localStorage.getItem(key)){
        alert("❌ Ya registró hoy");
        return;
    }

    localStorage.setItem(key, emocion);

    alert("✅ Emoción guardada: " + emocion);
}

</script>

</body>
</html>
